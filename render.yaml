services:
  - type: web
    name: resume-analyzer
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn backend.main:app --worker-class uvicorn.workers.UvicornWorker --workers 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ANALYSIS_API_KEY
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: ""
      - key: DATABASE_URL
        fromDatabase:
          name: resume-analyzer-db
          property: connectionString
      - key: TALENT_POOL_ROOT
        value: ./talent-pool
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: resume-analyzer-db
    plan: free
    databaseName: talent_pool
    ipAllowList: []
